<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Thiệp Cưới</title>
<style>
body{margin:0;font-family:sans-serif;background:#fff6f8;}
section{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px}
h1{font-size:48px;color:#c9184a}
h2{color:#c9184a}
img{max-width:320px;border-radius:10px;margin:10px}
button{padding:12px 25px;border:none;background:#c9184a;color:#fff;border-radius:8px;font-size:18px}
.timeline{max-width:600px}
.countdown{font-size:28px}
</style>
</head>

<body>

<section>
<h1>Hoàng & Tuyền</h1>
<p>Trân trọng kính mời</p>
<button onclick="document.getElementById('intro').scrollIntoView()">Mở thiệp</button>
</section>

<section id="intro">
<h2>Cô dâu & Chú rể</h2>
<p>Giới thiệu ngắn về hai bạn.</p>
<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">
</section>

<section>
<h2>Chuyện tình yêu</h2>
<div class="timeline">
<p>2019 – Lần đầu gặp nhau</p>
<p>2022 – Bắt đầu hẹn hò</p>
<p>2026 – Quyết định về chung một nhà</p>
</div>
</section>

<section>
<h2>Album ảnh</h2>
<img src="https://images.unsplash.com/photo-1520857014576-2c4f4c972b57">
<img src="https://images.unsplash.com/photo-1519741497674-611481863552">
</section>

<section>
<h2>Lễ Thành Hôn</h2>
<p>10:30 – 10/03/2026</p>
<p>Nhà hàng Hoa Sen</p>
<a href="https://maps.google.com"><button>Xem bản đồ</button></a>
</section>

<section>
<h2>Đếm ngược ngày cưới</h2>
<div class="countdown" id="countdown"></div>
</section>

<section>
<h2>Mừng cưới</h2>
<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=VietQR">
</section>

<script>
const wedding = new Date("2026-03-10");
function update(){
let now=new Date();
let diff=wedding-now;
let d=Math.floor(diff/86400000);
document.getElementById("countdown").innerText=d+" ngày nữa";
}
setInterval(update,1000);
</script>

</body>
</html>
