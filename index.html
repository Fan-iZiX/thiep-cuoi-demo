<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Wedding Invitation</title>

<style>

body{
margin:0;
font-family:Arial;
scroll-behavior:smooth;
background:#fff5f7;
}

section{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
opacity:0;
transform:translateY(80px);
transition:all 1s ease;
}

section.show{
opacity:1;
transform:translateY(0);
}

h1{
font-size:50px;
color:#d6336c;
}

h2{
font-size:35px;
}

p{
font-size:20px;
}

.cover{
background:linear-gradient(135deg,#ffd1dc,#ffe6ea);
}

.photo{
background:white;
}

.info{
background:#ffe6ea;
}

.qr{
background:white;
}

img{
max-width:350px;
border-radius:10px;
box-shadow:0 10px 20px rgba(0,0,0,0.2);
}

button{
padding:12px 30px;
border:none;
border-radius:10px;
background:#e63946;
color:white;
font-size:18px;
cursor:pointer;
}

</style>
</head>

<body>

<section class="cover">

<h1>Minh ♥ Lan</h1>

<p>Thiệp cưới</p>

<p>Kéo xuống để xem</p>

</section>


<section class="photo">

<h2>Chuyện tình của chúng tôi</h2>

<img src="https://images.unsplash.com/photo-1522673607200-164d1b6ce486">

<p>Tình yêu bắt đầu từ một nụ cười</p>

</section>


<section class="info">

<h1>Lễ Thành Hôn</h1>

<p>10:30 - 10/03/2026</p>

<p>Nhà hàng Hoa Sen</p>

<a href="https://maps.google.com" target="_blank">

<button>Xem bản đồ</button>

</a>

</section>


<section class="qr">

<h1>Mừng cưới</h1>

<p>Cảm ơn lời chúc của bạn</p>

<img src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=VietQR-demo">

</section>


<script>

const sections = document.querySelectorAll("section");

function checkScroll(){

const trigger = window.innerHeight * 0.8;

sections.forEach(section => {

const top = section.getBoundingClientRect().top;

if(top < trigger){

section.classList.add("show");

}

});

}

window.addEventListener("scroll",checkScroll);

checkScroll();

</script>

</body>
</html>
